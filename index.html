
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital ME Attendance Today - V2</title>
<style>
body{font-family:Arial,sans-serif;background:#eef2f7;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.header{text-align:center}.logo{max-width:180px}.header h1{color:#0a4d8c}
label{font-weight:bold;display:block;margin-top:12px}
input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-top:5px;box-sizing:border-box}
.leave-row{display:grid;grid-template-columns:2fr 1fr auto;gap:10px;margin-top:10px}
button{padding:10px 15px;border:none;border-radius:6px;color:#fff;cursor:pointer;margin-top:10px}
.add-btn{background:#28a745}.remove-btn{background:#dc3545}.generate-btn{background:#007bff;width:100%}.copy-btn{background:#6c757d}.whatsapp-btn{background:#25D366}
.action-buttons{display:flex;gap:10px;flex-wrap:wrap}.footer{text-align:center;margin-top:30px;padding-top:15px;border-top:1px solid #ddd;color:#666}
@media(max-width:600px){.leave-row{grid-template-columns:1fr}}
</style>
</head><body><div class="container">
<div class="header">
<img src="hyundai-logo.png" class="logo" alt="Hyundai Logo">
<h1>Digital ME Attendance Today</h1>
</div>
<label>Date</label><input type="date" id="attendanceDate">
<label>Planned Manpower</label><input type="number" id="planned">
<label>Actual Manpower</label><input type="number" id="actual">
<h3>Leave Details</h3><div id="leaveContainer"></div>
<button class="add-btn" onclick="addLeaveRow()">+ Add Employee Leave</button><br><br>
<button class="generate-btn" onclick="generateSummary()">Generate Attendance Summary</button>
<h3>Summary</h3><textarea id="summary" rows="10"></textarea>
<div class="action-buttons">
<button class="copy-btn" onclick="copySummary()">Copy Summary</button>
<button class="whatsapp-btn" onclick="shareWhatsApp()">Send to WhatsApp</button>
</div>
<div class="footer"><strong>Digital ME Attendance System v1.0</strong><br>Developed &amp; Maintained by <strong>Hari</strong><br>For feedback: <a href="tel:+919841623075">+91 98416 23075</a></div>
</div>
<script>
const employees=["Suresh TPSk [DH]","Logeshraj [DIGITAL SDH]","Yuvaraj [MDA SDH]","Ram kumar [DIGITAL]","Joseph Leo [DIGITAL]","Sudharsan [MDA]","Arun [MDA]","Hari [DIGITAL]","Prasanna [DIGITAL]","Sadeesh [MDA]","Arul [DIGITAL]","Devasena [DIGITAL]","Subhasri [MDA]","Joel [MDA]","Stefina [MDA]","Silvanus [MDA]","Eben [DIGITAL]","Mathesh [GAT]","Rufus Joel [GAT]"];
const leaveTypes=["CL","SL","COFF","CVL","PL","LC 1 hour","LC 2 hours","2nd Half coming"];
document.getElementById("attendanceDate").valueAsDate=new Date();
function addLeaveRow(){const r=document.createElement("div");r.className="leave-row";r.innerHTML=`<select class='employee'>${employees.map(e=>`<option>${e}</option>`).join("")}</select><select class='leaveType'>${leaveTypes.map(l=>`<option>${l}</option>`).join("")}</select><button class='remove-btn' onclick='this.parentElement.remove()'>X</button>`;leaveContainer.appendChild(r);}
function generateSummary(){let p=+planned.value||0,a=+actual.value||0,per=p?((a/p)*100).toFixed(1):0,t="";document.querySelectorAll(".employee").forEach((e,i)=>t+=`${i+1}. ${e.value} - ${document.querySelectorAll(".leaveType")[i].value}\n`);summary.value=`Digital ME Attendance Today\n\nDate: ${attendanceDate.value}\nPlanned: ${p}\nActual: ${a}\nAttendance: ${per}%\n\nLeave Details\n${t||"No Leave Records"}\nRegards,\nDigital ME Team`;}
function copySummary(){navigator.clipboard.writeText(summary.value);alert("Copied");}
function shareWhatsApp(){window.open("https://wa.me/?text="+encodeURIComponent(summary.value),"_blank");}
addLeaveRow();
</script></body></html>
